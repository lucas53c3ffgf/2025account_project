<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Remove Employee</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #f6f8fb, #eef3f9);
            padding: 0;
            font-size: 17px;
            line-height: 1.5;
        }

        .confirm-card {
            width: 100%;
            min-height: 100vh;
            background: #fff;
            border: 1px solid #dbe5f0;
            border-radius: 0;
            padding: 28px;
        }

        .btn {
            font-size: 1rem;
            padding: 0.55rem 0.95rem;
        }
    </style>
</head>
<body>
    <section class="confirm-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h1 class="h5 mb-0">Confirm Remove Employee</h1>
            <div class="d-flex gap-2 align-items-center"><a href="{{ url_for('history') }}" class="btn btn-outline-primary btn-sm">History</a><div class="text-muted small">{{ user_name }}</div></div>
        </div>

        <p class="mb-3">
            Are you sure you want to remove
            <strong>{{ employee.name }}</strong>
            (ID: {{ employee.id }})?
        </p>

        <div class="alert alert-warning py-2" role="alert">
            This action removes the employee from the dashboard and employee pages.
        </div>

        <form method="post" action="{{ url_for('remove_employee', employee_id=employee.id) }}" class="d-flex gap-2 mt-3">
            <input type="hidden" name="next" value="{{ next_url }}">
            <button type="submit" name="action" value="confirm" class="btn btn-danger">Confirm Remove</button>
            <button type="submit" name="action" value="cancel" class="btn btn-outline-secondary">Cancel</button>
        </form>
    </section>
</body>
</html>
