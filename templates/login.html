<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        :root {
            --bg-start: #f6f9fc;
            --bg-end: #e9f2ff;
            --card-shadow: 0 15px 35px rgba(14, 32, 70, 0.12);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            border: 0;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        .password-wrap {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #0d6efd;
            font-size: 0.9rem;
            padding: 0.25rem 0.4rem;
        }
    </style>
</head>
<body>
    <main class="card login-card p-4 p-md-5" aria-labelledby="loginHeading">
        <div class="text-center mb-4">
            <h1 id="loginHeading" class="h3 mb-2">Welcome Back</h1>
            <p class="text-muted mb-0">Sign in to continue</p>
        </div>

        {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form id="loginForm" method="post" action="{{ url_for('login') }}" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    autocomplete="username"
                    placeholder="Enter your email"
                    required
                >
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>

            <div class="mb-3 password-wrap">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    placeholder="Enter your password"
                    required
                    minlength="8"
                >
                <button type="button" class="toggle-password" id="togglePassword">Show</button>
                <div class="invalid-feedback">Password must be at least 8 characters.</div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="link-primary text-decoration-none">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">Log In</button>

            <p class="text-center mt-4 mb-0 text-muted">
                Don't have an account?
                <a href="{{ url_for('signup') }}" class="text-decoration-none">Sign up</a>
            </p>
        </form>
    </main>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? 'Hide' : 'Show';
        });

        loginForm.addEventListener('submit', (event) => {
            if (!loginForm.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            loginForm.classList.add('was-validated');
        });
    </script>
</body>
</html>
