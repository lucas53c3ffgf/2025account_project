<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        :root {
            --bg-start: #f7fbf8;
            --bg-end: #e7f4ec;
            --card-shadow: 0 15px 35px rgba(20, 60, 35, 0.12);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .signup-card {
            width: 100%;
            max-width: 460px;
            border: 0;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        .password-wrap {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #198754;
            font-size: 0.9rem;
            padding: 0.25rem 0.4rem;
        }
    </style>
</head>
<body>
    <main class="card signup-card p-4 p-md-5" aria-labelledby="signupHeading">
        <div class="text-center mb-4">
            <h1 id="signupHeading" class="h3 mb-2">Create Account</h1>
            <p class="text-muted mb-0">Set up your account to get started</p>
        </div>

        {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form id="signupForm" method="post" action="{{ url_for('signup') }}" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    autocomplete="email"
                    placeholder="Enter your email"
                    required
                >
                <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>

            <div class="mb-3 password-wrap">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    autocomplete="new-password"
                    placeholder="Create a password"
                    minlength="8"
                    required
                >
                <button type="button" class="toggle-password" id="togglePassword1">Show</button>
                <div class="invalid-feedback">Password must be at least 8 characters.</div>
            </div>

            <div class="mb-3 password-wrap">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="confirmPassword"
                    name="confirm_password"
                    autocomplete="new-password"
                    placeholder="Confirm your password"
                    minlength="8"
                    required
                >
                <button type="button" class="toggle-password" id="togglePassword2">Show</button>
                <div class="invalid-feedback" id="confirmFeedback">Please confirm your password.</div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2">Create Account</button>

            <p class="text-center mt-4 mb-0 text-muted">
                Already have an account?
                <a href="{{ url_for('login') }}" class="text-decoration-none">Log in</a>
            </p>
        </form>
    </main>

    <script>
        const signupForm = document.getElementById('signupForm');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const confirmFeedback = document.getElementById('confirmFeedback');

        function wireToggle(buttonId, inputId) {
            const btn = document.getElementById(buttonId);
            const input = document.getElementById(inputId);
            btn.addEventListener('click', () => {
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.textContent = isPassword ? 'Hide' : 'Show';
            });
        }

        wireToggle('togglePassword1', 'password');
        wireToggle('togglePassword2', 'confirmPassword');

        signupForm.addEventListener('submit', (event) => {
            const passwordsMatch = password.value === confirmPassword.value;

            if (!passwordsMatch) {
                confirmPassword.setCustomValidity('Passwords do not match.');
                confirmFeedback.textContent = 'Passwords do not match.';
            } else {
                confirmPassword.setCustomValidity('');
                confirmFeedback.textContent = 'Please confirm your password.';
            }

            if (!signupForm.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }

            signupForm.classList.add('was-validated');
        });
    </script>
</body>
</html>
